name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Setup backend Prisma + DB
        working-directory: ./server
        run: |
          npx prisma generate
          npx prisma migrate deploy
          node prisma/seed.js
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: testing_secret

      - name: Lint backend
        working-directory: ./server
        run: npm run lint

      - name: Test backend
        working-directory: ./server
        run: npm test
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: testing_secret

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint frontend
        working-directory: ./client
        run: npm run lint

      - name: Test frontend
        working-directory: ./client
        run: npm test -- --run

      - name: Build frontend
        working-directory: ./client
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./server
        run: npm ci

      - name: Setup backend DB
        working-directory: ./server
        run: |
          npx prisma generate
          npx prisma migrate deploy
          node prisma/seed.js
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: testing_secret

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./client
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Start backend server
        working-directory: ./server
        run: npm start &
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: testing_secret
          PORT: 5001

      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:5001/api/health --timeout 30000

      - name: Preview frontend
        working-directory: ./client
        run: npm run preview &

      - name: Wait for frontend to be ready
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run E2E tests
        working-directory: ./client
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
